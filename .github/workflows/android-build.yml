name: Build StealthCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Node ─────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ───────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Sync Capacitor ─────────────────────────────────
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 6. Grant gradlew execute permission ───────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 7. Build debug APK ────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      # ── 8. Upload APK artifact ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StealthCam-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release-apk:
    name: Build Signed Release APK (optional)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    # Uncomment when you have signing secrets configured
    # needs: build-apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Create keystore from base64 secret
      # Add these secrets to GitHub repo Settings > Secrets:
      #   KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      - name: Decode Keystore (if secret exists)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: StealthCam-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
