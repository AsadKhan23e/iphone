name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Specifically use macOS 14 for stability

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --no-codesign --release

      - name: Package IPA
        run: |
          mkdir -p Payload
          find build/ios -name "Runner.app" -type d -exec cp -r {} Payload/ \;
          zip -r stealth_recorder.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stealth-recorder-ipa
          path: stealth_recorder.ipa
