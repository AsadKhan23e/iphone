name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.10.7'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --no-codesign --release

      - name: Create Placeholder IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphone/Release-iphoneos/Runner.app Payload/
          zip -r stealth_recorder.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stealth-recorder-ipa
          path: stealth_recorder.ipa
