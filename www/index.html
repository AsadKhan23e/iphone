<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>StealthCam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════════ PIN LOCK SCREEN ══════════════ -->
<div id="pinScreen" class="screen active">
  <div class="pin-container">
    <div class="app-logo">
      <div class="logo-icon">📷</div>
      <h1 class="app-name">StealthCam</h1>
      <p class="app-sub">Private Recording Vault</p>
    </div>
    <div id="pinTitle" class="pin-title">Enter PIN</div>
    <div id="pinDots" class="pin-dots">
      <span class="dot" id="d1"></span>
      <span class="dot" id="d2"></span>
      <span class="dot" id="d3"></span>
      <span class="dot" id="d4"></span>
    </div>
    <div id="pinError" class="pin-error"></div>
    <div class="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2<span>ABC</span></button>
      <button class="num-btn" onclick="pinPress('3')">3<span>DEF</span></button>
      <button class="num-btn" onclick="pinPress('4')">4<span>GHI</span></button>
      <button class="num-btn" onclick="pinPress('5')">5<span>JKL</span></button>
      <button class="num-btn" onclick="pinPress('6')">6<span>MNO</span></button>
      <button class="num-btn" onclick="pinPress('7')">7<span>PQRS</span></button>
      <button class="num-btn" onclick="pinPress('8')">8<span>TUV</span></button>
      <button class="num-btn" onclick="pinPress('9')">9<span>WXYZ</span></button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="pinPress('0')">0</button>
      <button class="num-btn del-btn" onclick="pinDelete()">⌫</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN RECORDER SCREEN ══════════════ -->
<div id="recorderScreen" class="screen">

  <!-- Camera Preview -->
  <video id="videoPreview" autoplay playsinline muted></video>

  <!-- Stealth Overlay (black screen simulation) -->
  <div id="stealthOverlay" class="stealth-overlay hidden">
    <div class="stealth-content">
      <div class="stealth-dot" id="recDot"></div>
      <p class="stealth-text">Tap 3x to unlock</p>
    </div>
  </div>

  <!-- Top Controls -->
  <div class="top-bar">
    <button class="icon-btn" id="galleryBtn" onclick="showGallery()">
      <svg viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-2 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
    </button>
    <div class="rec-timer" id="recTimer">00:00</div>
    <button class="icon-btn" id="settingsBtn" onclick="showSettings()">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </button>
  </div>

  <!-- Bottom Controls -->
  <div class="bottom-bar">
    <button class="ctrl-btn" id="flashBtn" onclick="toggleFlash()">
      <svg id="flashIcon" viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
      <span>Flash</span>
    </button>

    <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
      <div class="record-inner" id="recordInner"></div>
    </button>

    <button class="ctrl-btn" id="flipBtn" onclick="switchCamera()">
      <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-2c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/><path d="M12 10l-4 4h3v4h2v-4h3z"/></svg>
      <span>Flip</span>
    </button>
  </div>

  <!-- Stealth Mode Button -->
  <button class="stealth-btn" id="stealthBtn" onclick="activateStealth()">
    <svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
    Stealth Mode
  </button>
</div>

<!-- ══════════════ GALLERY SCREEN ══════════════ -->
<div id="galleryScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showRecorder()">← Back</button>
    <h2>My Recordings</h2>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
  </div>
  <div id="galleryGrid" class="gallery-grid">
    <div class="empty-state">
      <div class="empty-icon">🎥</div>
      <p>No recordings yet</p>
    </div>
  </div>
</div>

<!-- ══════════════ SETTINGS SCREEN ══════════════ -->
<div id="settingsScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showRecorder()">← Back</button>
    <h2>Settings</h2>
  </div>
  <div class="settings-list">
    <div class="setting-group">
      <h3 class="group-title">Security</h3>
      <div class="setting-item">
        <span>Change PIN</span>
        <button class="setting-action" onclick="changePin()">Change</button>
      </div>
    </div>
    <div class="setting-group">
      <h3 class="group-title">Recording</h3>
      <div class="setting-item">
        <span>Video Quality</span>
        <select id="qualitySelect" class="setting-select">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="setting-item">
        <span>Keep Screen On</span>
        <label class="toggle">
          <input type="checkbox" id="wakeLockToggle" onchange="toggleWakeLock(this)" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="setting-group">
      <h3 class="group-title">Storage</h3>
      <div class="setting-item">
        <span>Total Recordings</span>
        <span id="totalRec" class="setting-value">0</span>
      </div>
      <div class="setting-item">
        <span>Storage Used</span>
        <span id="storageUsed" class="setting-value">0 MB</span>
      </div>
    </div>
    <div class="setting-group">
      <h3 class="group-title">About</h3>
      <div class="setting-item">
        <span>App Version</span>
        <span class="setting-value">1.0.0</span>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ VIDEO PLAYER MODAL ══════════════ -->
<div id="videoModal" class="modal hidden">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <video id="modalVideo" controls playsinline></video>
    <div class="modal-actions">
      <button class="modal-btn export-btn" onclick="exportToGallery()">
        📥 Save to Gallery
      </button>
      <button class="modal-btn delete-btn" onclick="deleteCurrentVideo()">
        🗑️ Delete
      </button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
